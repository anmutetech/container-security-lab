apiVersion: apps/v1
kind: Deployment
metadata:
  name: vaultpay-gateway
  namespace: vaultpay-ns
  labels:
    app: vaultpay
    compliance: pci-dss
spec:
  replicas: 2
  selector:
    matchLabels:
      app: vaultpay
  template:
    metadata:
      labels:
        app: vaultpay
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: vaultpay-gateway
          image: <your-dockerhub-username>/vaultpay-gateway:latest
          ports:
            - containerPort: 3000
              name: http
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          securityContext:
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
